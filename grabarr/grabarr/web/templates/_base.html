<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Grabarr{% endblock %}</title>
  <!-- MVP uses the Tailwind Play CDN; production Docker build compiles
       via the Tailwind CLI to grabarr/web/static/css/tailwind.build.css. -->
  <script src="https://cdn.tailwindcss.com"></script>
  {% raw %}
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: {} },
    };
  </script>
  <style type="text/tailwindcss">
    @layer components {
      .btn { @apply inline-flex items-center justify-center gap-2 rounded-md px-4 py-2 text-sm font-medium transition focus:outline-none focus:ring-2 focus:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50; }
      .btn-primary { @apply btn bg-indigo-600 text-white hover:bg-indigo-700 focus:ring-indigo-500; }
      .btn-secondary { @apply btn bg-gray-200 text-gray-900 hover:bg-gray-300 focus:ring-gray-500 dark:bg-gray-700 dark:text-gray-100 dark:hover:bg-gray-600; }
      .btn-ghost { @apply btn bg-transparent text-gray-700 hover:bg-gray-100 focus:ring-gray-500 dark:text-gray-300 dark:hover:bg-gray-800; }
      .card { @apply rounded-lg border border-gray-200 bg-white p-5 shadow-sm dark:border-gray-700 dark:bg-gray-800; }
      .badge { @apply inline-flex items-center rounded-full px-2.5 py-0.5 text-xs font-medium; }
      .badge-neutral { @apply badge bg-gray-100 text-gray-800 dark:bg-gray-700 dark:text-gray-200; }
      .badge-success { @apply badge bg-green-100 text-green-800 dark:bg-green-900 dark:text-green-200; }
      .badge-warning { @apply badge bg-amber-100 text-amber-800 dark:bg-amber-900 dark:text-amber-200; }
      .badge-error   { @apply badge bg-red-100 text-red-800 dark:bg-red-900 dark:text-red-200; }
    }
  </style>
  {% endraw %}
  <script>
    // Apply theme before paint to avoid flash.
    (function () {
      const saved = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const theme = saved || (prefersDark ? 'dark' : 'light');
      if (theme === 'dark') document.documentElement.classList.add('dark');
    })();
  </script>
</head>
<body class="h-full bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-gray-100 antialiased">
  <header class="sticky top-0 z-20 border-b border-gray-200 bg-white/90 backdrop-blur dark:border-gray-700 dark:bg-gray-900/90">
    <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-3">
      <a href="/" class="flex items-center gap-2 text-lg font-semibold">
        <span class="inline-flex h-8 w-8 items-center justify-center rounded-md bg-indigo-600 text-white">G</span>
        <span>Grabarr</span>
      </a>
      <nav class="hidden md:flex items-center gap-4 text-sm">
        <a href="/" class="hover:text-indigo-600 dark:hover:text-indigo-400">Dashboard</a>
        <a href="/profiles" class="hover:text-indigo-600 dark:hover:text-indigo-400">Profiles</a>
        <a href="/sources" class="hover:text-indigo-600 dark:hover:text-indigo-400">Sources</a>
        <a href="/notifications" class="hover:text-indigo-600 dark:hover:text-indigo-400">Notifications</a>
        <a href="/healthz" class="hover:text-indigo-600 dark:hover:text-indigo-400">Health</a>
      </nav>
      <button id="theme-toggle"
              class="btn-ghost"
              aria-label="Toggle dark mode"
              onclick="
                document.documentElement.classList.toggle('dark');
                localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
              ">
        <svg class="h-4 w-4 dark:hidden" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/></svg>
        <svg class="h-4 w-4 hidden dark:block" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zM10 16a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 4.636a1 1 0 011.414 0l.707.707a1 1 0 01-1.414 1.414l-.707-.707a1 1 0 010-1.414zM13.536 13.536a1 1 0 011.414 0l.707.707a1 1 0 01-1.414 1.414l-.707-.707a1 1 0 010-1.414zM3 10a1 1 0 011-1h1a1 1 0 110 2H4a1 1 0 01-1-1zM16 10a1 1 0 011-1h1a1 1 0 110 2h-1a1 1 0 01-1-1zM5.05 15.364a1 1 0 010-1.414l.707-.707a1 1 0 011.414 1.414l-.707.707a1 1 0 01-1.414 0zM13.536 6.464a1 1 0 010-1.414l.707-.707a1 1 0 011.414 1.414l-.707.707a1 1 0 01-1.414 0zM10 6a4 4 0 100 8 4 4 0 000-8z"/></svg>
      </button>
    </div>
  </header>

  <main class="mx-auto max-w-7xl px-4 py-6">
    {% block content %}{% endblock %}
  </main>

  <footer class="mt-12 border-t border-gray-200 bg-white py-4 text-center text-xs text-gray-500 dark:border-gray-700 dark:bg-gray-900 dark:text-gray-400">
    Grabarr v{{ version | default('1.0.0') }} · served behind your own reverse proxy
  </footer>
</body>
</html>
